AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Amazon Revenue Manager - TypeScript Lambda Backend with Cognito

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    MemorySize: 256
    Timeout: 60
    Environment:
      Variables:
        SETTLEMENT_TABLE_NAME: !Ref SettlementsTable
        SKU_NAME_TABLE_NAME: !Ref SkuNamesTable
        ADVERTISEMENT_TABLE_NAME: !Ref AdvertisementsTable
        PURCHASE_TABLE_NAME: !Ref PurchasesTable
        SALES_DATE_TABLE_NAME: !Ref SalesDatesTable

Resources:
  # --- Cognito Resources ---
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: AmzRevenueUserPool
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: AmzRevenueWebClient
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  # --- API Gateway with Cognito Authorizer ---
  ServerlessHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              audience:
                - !Ref UserPoolClient
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"

  # --- Lambda Functions ---
  
  # 1. 決済レポート処理
  ProcessSettlementFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./dist
      Handler: handlers/processSettlement.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettlementsTable
      Events:
        UploadApi:
          Type: HttpApi
          Properties:
            Path: /sales/upload
            Method: post

  # 2. 収益サマリー取得
  GetRevenueSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./dist
      Handler: handlers/getRevenueSummary.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SettlementsTable
        - DynamoDBReadPolicy:
            TableName: !Ref SkuNamesTable
      Events:
        SummaryApi:
          Type: HttpApi
          Properties:
            Path: /sales/summary
            Method: get

  # 3. SKU名管理
  ManageSkuNameFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./dist
      Handler: handlers/manageSkuName.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SkuNamesTable
      Events:
        GetApi:
          Type: HttpApi
          Properties:
            Path: /sku-names
            Method: get
        PostApi:
          Type: HttpApi
          Properties:
            Path: /sku-names
            Method: post
        DeleteApi:
          Type: HttpApi
          Properties:
            Path: /sku-names
            Method: delete

  # 4. 広告レポート処理
  UploadAdvertisementFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./dist
      Handler: handlers/uploadAdvertisement.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdvertisementsTable
      Events:
        UploadApi:
          Type: HttpApi
          Properties:
            Path: /sales/upload-advertisement
            Method: post

  # 5. 仕入れ情報管理
  ManagePurchaseFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./dist
      Handler: handlers/managePurchase.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PurchasesTable
      Events:
        GetApi:
          Type: HttpApi
          Properties:
            Path: /purchase
            Method: get
        PostApi:
          Type: HttpApi
          Properties:
            Path: /purchase
            Method: post

  # 6. 月次サマリー取得
  GetMonthlySummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./dist
      Handler: handlers/getMonthlySummary.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SettlementsTable
        - DynamoDBReadPolicy:
            TableName: !Ref SkuNamesTable
        - DynamoDBReadPolicy:
            TableName: !Ref AdvertisementsTable
        - DynamoDBReadPolicy:
            TableName: !Ref PurchasesTable
        - DynamoDBReadPolicy:
            TableName: !Ref SalesDatesTable
      Events:
        SummaryApi:
          Type: HttpApi
          Properties:
            Path: /monthly-summary
            Method: get

  # --- DynamoDB Tables ---
  SettlementsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  SkuNamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: sku
          AttributeType: S
      KeySchema:
        - AttributeName: sku
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  AdvertisementsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  PurchasesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  SalesDatesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

Outputs:
  ApiEndpoint:
    Description: "HTTP API endpoint URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool
  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref UserPoolClient
