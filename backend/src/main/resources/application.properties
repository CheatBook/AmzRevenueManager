spring.application.name=amzrevenuemanager

spring.datasource.url=jdbc:mysql://127.0.0.1:3308/amazon_balance_calculation?characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&forceConnectionTimeZoneToSession=true
